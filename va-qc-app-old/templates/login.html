{% extends "base.html" %}

{% block extra_css %}
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.login-container {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    padding: 40px;
    text-align: center;
}
.logo { margin-bottom: 30px; }
.logo h1 { font-size: 28px; color: #333; }
.logo span { color: #667eea; }
.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; }
.form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
}
.form-group input:focus {
    outline: none;
    border-color: #667eea;
}
.btn-full { width: 100%; padding: 14px; font-size: 16px; }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="logo">
        <h1>Vulcan Arc <span>QC</span></h1>
        <p style="color:#666;margin-top:8px;">Valve Tracking System</p>
    </div>
    <form method="post" action="/login">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-full">Sign In</button>
    </form>
    <p style="margin-top:24px;font-size:13px;color:#666;">
        Demo: rob/lerato/gideon/demo<br>Password: vulcan123
    </p>
</div>
{% endblock %}
