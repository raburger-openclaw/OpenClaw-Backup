{% extends "base.html" %}

{% block title %}New Valve - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #667eea; }
</style>
{% endblock %}

{% block content %}
<a href="/dashboard" class="btn btn-secondary" style="margin-bottom:16px;">← Back to Dashboard</a>

<div class="card">
    <h2 style="margin-bottom: 24px; font-size: 24px;">Create New Valve</h2>
    
    <form method="post" action="/valve/new">
        <div class="form-grid">
            <div>
                <h3 class="section-title">Job Numbers</h3>
                <div class="form-group">
                    <label for="qj_number">QJ Number</label>
                    <input type="text" id="qj_number" name="qj_number" required placeholder="e.g. 1234">
                </div>
                <div class="form-group">
                    <label for="wg_number">WG Number</label>
                    <input type="text" id="wg_number" name="wg_number" required placeholder="e.g. 5678">
                </div>
            </div>
            
            <div>
                <h3 class="section-title">Valve Body</h3>
                <div class="form-group">
                    <label for="body_brand">Body Brand</label>
                    <input type="text" id="body_brand" name="body_brand" required placeholder="e.g. PIB">
                </div>
                <div class="form-group">
                    <label for="body_type">Body Type</label>
                    <select id="body_type" name="body_type" required>
                        <option value="Ball">Ball</option>
                        <option value="Butterfly">Butterfly</option>
                        <option value="Gate">Gate</option>
                        <option value="Plug">Plug</option>
                    </select>
                </div>
            </div>
            
            <div>
                <h3 class="section-title">Actuator</h3>
                <div class="form-group">
                    <label for="actuator_brand">Actuator Brand</label>
                    <input type="text" id="actuator_brand" name="actuator_brand" required placeholder="e.g. Rotork">
                </div>
                <div class="form-group">
                    <label for="actuator_type">Actuator Type</label>
                    <select id="actuator_type" name="actuator_type" required>
                        <option value="Diaphragm">Diaphragm</option>
                        <option value="Rack and Pinion">Rack and Pinion</option>
                        <option value="Scotch Yolk">Scotch Yolk</option>
                        <option value="Piston">Piston</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model_number">Model Number</label>
                    <input type="text" id="model_number" name="model_number" placeholder="Optional">
                </div>
            </div>
            
            <div>
                <h3 class="section-title">Details</h3>
                <div class="form-group">
                    <label for="size">Size</label>
                    <input type="text" id="size" name="size" required placeholder='e.g. 1/2"'>
                </div>
                <div class="form-group">
                    <label for="artisan">Assigned Artisan</label>
                    <select id="artisan" name="artisan" required>
                        {% for a in artisans %}
                        <option value="{{ a }}">{{ a }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        
        <div class="form-group" style="margin-top: 24px;">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Optional notes..."></textarea>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn">Create Valve</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
