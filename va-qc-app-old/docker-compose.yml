version: '3.8'

services:
  va-qc-app:
    build: .
    container_name: va-qc-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./.env:/app/.env:ro
    networks:
      - va-qc-network

networks:
  va-qc-network:
    driver: bridge