<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .app-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 { font-size: 20px; font-weight: 600; }
        .user-menu { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .user-menu a { color: white; text-decoration: none; opacity: 0.9; }
        .user-menu a:hover { opacity: 1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .alert-error { background: #ffebee; color: #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; color: #666; text-transform: uppercase; font-weight: 600; }
        td { padding: 16px; border-top: 1px solid #e5e7eb; font-size: 14px; }
        tr:hover td { background: #f9fafb; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-received { background: #e3f2fd; color: #1976d2; }
        .status-in-stripped { background: #fff3e0; color: #f57c00; }
        .status-in-before-assembly { background: #f3e5f5; color: #7b1fa2; }
        .status-in-final { background: #e8f5e9; color: #388e3c; }
        .status-complete { background: #e0f7fa; color: #00838f; }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 24px; }
        .mb-4 { margin-bottom: 24px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if user %}
    <div class="app-header">
        <h1><a href="/dashboard" style="color:white;text-decoration:none;">{{ app_name }}</a></h1>
        <div class="user-menu">
            <span>{{ user.name }} ({{ user.role }})</span>
            <a href="/logout">Logout</a>
        </div>
    </div>
    {% endif %}

    <div class="container">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
